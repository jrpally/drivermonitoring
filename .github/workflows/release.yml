name: Build & Release

# Runs on every push to main/development branches, and on version tags (v1.2.3)
on:
  push:
    branches:
      - main
      - development
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write   # required to create a GitHub release

    steps:
      # ── 0. Diagnostics ───────────────────────────────────────────────────────
      - name: Runner environment
        shell: pwsh
        run: |
          Write-Host "=== Runner info ==="
          Write-Host "OS       : $([System.Environment]::OSVersion.VersionString)"
          Write-Host "Machine  : $env:COMPUTERNAME"
          Write-Host "Ref      : ${{ github.ref }}"
          Write-Host "SHA      : ${{ github.sha }}"
          Write-Host "Workflow : ${{ github.workflow }} #${{ github.run_number }}"
          Write-Host "=== Disk space ==="
          Get-PSDrive C | Select-Object Used,Free | Format-Table -AutoSize
          Write-Host "=== .NET SDKs ==="
          dotnet --list-sdks
          Write-Host "=== Windows Kits ==="
          $kits = "C:\Program Files (x86)\Windows Kits\10\Include"
          if (Test-Path $kits) { Get-ChildItem $kits -Directory | Select-Object Name }
          else { Write-Host "(WDK not yet installed)" }

      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Version ───────────────────────────────────────────────────────────
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ref = "${{ github.ref }}"
          if ($ref -like 'refs/tags/v*') {
            # Triggered by a tag — use the tag as the version
            $tag            = "${{ github.ref_name }}"
            $version        = $tag.TrimStart('v')          # e.g. 1.2.3
            $assemblyVersion = "$version.0"                # e.g. 1.2.3.0
            $isRelease      = 'true'
          } else {
            # Triggered by a branch push — informational pre-release version
            $sha            = "${{ github.sha }}".Substring(0,7)
            $branch         = "${{ github.ref_name }}" -replace '[^a-zA-Z0-9\-]','-'
            $version        = "0.0.0-$branch.$sha"         # e.g. 0.0.0-main.a1b2c3d
            $assemblyVersion = "0.0.0.0"                   # AssemblyVersion must be numeric
            $tag            = ""
            $isRelease      = 'false'
          }
          "VERSION=$version"                | Out-File $env:GITHUB_OUTPUT -Append
          "ASSEMBLY_VERSION=$assemblyVersion" | Out-File $env:GITHUB_OUTPUT -Append
          "TAG=$tag"                        | Out-File $env:GITHUB_OUTPUT -Append
          "IS_RELEASE=$isRelease"           | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Version          : $version"
          Write-Host "Assembly version : $assemblyVersion"
          Write-Host "Is release       : $isRelease"

      # ── 3. Toolchain ─────────────────────────────────────────────────────────
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Windows Driver Kit (WDK)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $wdkUrl    = "https://go.microsoft.com/fwlink/?linkid=2249371"
          $installer = "$env:TEMP\wdksetup.exe"
          Write-Host "Downloading WDK (~1 GB) — this takes several minutes ..."
          try {
            Invoke-WebRequest -Uri $wdkUrl -OutFile $installer -UseBasicParsing -TimeoutSec 600
          } catch {
            throw "WDK download failed: $_"
          }
          Write-Host "Download complete ($('{0:N0}' -f (Get-Item $installer).Length) bytes). Running installer ..."
          $proc = Start-Process -Wait -PassThru -FilePath $installer `
                    -ArgumentList "/quiet /norestart /ceip off"
          Write-Host "WDK installer exited with code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            throw "WDK installer failed with exit code $($proc.ExitCode)"
          }
          $kmInc = "C:\Program Files (x86)\Windows Kits\10\Include"
          if (-not (Test-Path $kmInc)) {
            throw "WDK include path not found after install: $kmInc"
          }
          $wdkVer = (Get-ChildItem $kmInc -Directory | Sort-Object Name -Descending | Select-Object -First 1).Name
          Write-Host "WDK installed. Version: $wdkVer"

      # ── 4. Stamp version ─────────────────────────────────────────────────────
      - name: Stamp DriverVer in INF
        if: steps.ver.outputs.IS_RELEASE == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.ver.outputs.VERSION }}"
          $date    = (Get-Date -Format "MM/dd/yyyy")
          $inf     = "src\driver\FileMonitorDriver\FileMonitorDriver.inf"
          $content = Get-Content $inf -Raw
          $content = $content -replace 'DriverVer\s*=\s*[^\r\n]+', "DriverVer   = $date,$version.0"
          Set-Content $inf $content -NoNewline
          Write-Host "DriverVer set to: $date,$version.0"

      # ── 5. Build minifilter driver ────────────────────────────────────────────
      #    Run explicitly so output is visible; MSBuild target skipped via flag below
      - name: Build minifilter driver
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "=== Building minifilter driver ==="
          .\scripts\Build-Driver.ps1 -Configuration Release
          if ($LASTEXITCODE -ne 0) { throw "Build-Driver.ps1 failed with exit code $LASTEXITCODE" }
          Write-Host "=== Driver build output ==="
          Get-ChildItem bin\Release\x64 -ErrorAction SilentlyContinue | Format-Table Name,Length,LastWriteTime -AutoSize

      # ── 6. Build .NET solution ────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore FileMonitor.sln --verbosity normal

      - name: Build solution (Release)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $v  = "${{ steps.ver.outputs.VERSION }}"
          $av = "${{ steps.ver.outputs.ASSEMBLY_VERSION }}"
          Write-Host "=== dotnet build — version=$v assemblyVersion=$av ==="
          # SkipBuildDriver=true prevents MSBuild from running Build-Driver.ps1 again
          dotnet build FileMonitor.sln -c Release --no-restore --verbosity normal `
            /p:Version=$v /p:AssemblyVersion=$av /p:FileVersion=$av `
            /p:SkipBuildDriver=true
          if ($LASTEXITCODE -ne 0) { throw "dotnet build failed with exit code $LASTEXITCODE" }
          Write-Host "=== .NET build output ==="
          Get-ChildItem bin\Release -Recurse -File -Include *.exe,*.dll,*.sys | Format-Table FullName,Length -AutoSize

      # ── 7. Publish self-contained Live app ────────────────────────────────────
      - name: Publish FileMonitor.Live (single-file)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $v  = "${{ steps.ver.outputs.VERSION }}"
          $av = "${{ steps.ver.outputs.ASSEMBLY_VERSION }}"
          dotnet publish src\FileMonitor.Live\FileMonitor.Live.csproj `
            -c Release -r win-x64 --self-contained --verbosity normal `
            /p:PublishSingleFile=true `
            /p:Version=$v /p:AssemblyVersion=$av /p:FileVersion=$av `
            /p:SkipBuildDriver=true `
            -o "staging\live"
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed with exit code $LASTEXITCODE" }

      # ── 8. Package artifacts ──────────────────────────────────────────────────
      - name: Package release artifacts
        id: pkg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $v    = "${{ steps.ver.outputs.VERSION }}"
          $base = "staging"

          # Driver binaries
          $null = New-Item "$base\driver" -ItemType Directory -Force
          Copy-Item "bin\Release\x64\FileMonitorDriver.sys" "$base\driver\"
          Copy-Item "bin\Release\x64\FileMonitorDriver.inf" "$base\driver\"

          # Windows Service
          $null = New-Item "$base\service" -ItemType Directory -Force
          Copy-Item "bin\Release\net8.0-windows\win-x64\*" "$base\service\" `
            -Recurse -Exclude "*.pdb","*.xml"

          # Client library
          $null = New-Item "$base\client" -ItemType Directory -Force
          Copy-Item "bin\Release\net8.0\FileMonitor.Client.dll" "$base\client\"
          $depJson = "bin\Release\net8.0\FileMonitor.Client.deps.json"
          if (Test-Path $depJson) { Copy-Item $depJson "$base\client\" }

          # Deployment scripts
          $null = New-Item "$base\scripts" -ItemType Directory -Force
          Copy-Item "scripts\Install-Driver.bat"   "$base\scripts\"
          Copy-Item "scripts\Uninstall-Driver.bat" "$base\scripts\"
          Copy-Item "scripts\Manage-Service.bat"   "$base\scripts\"

          # Zip everything
          $zip = "FileMonitor-v$v-win-x64.zip"
          Compress-Archive -Path "$base\*" -DestinationPath $zip -Force
          Write-Host "Created $zip"
          "ZIP_NAME=$zip" | Out-File $env:GITHUB_OUTPUT -Append

      # ── 9. Upload workflow artifact (every build) ────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileMonitor-v${{ steps.ver.outputs.VERSION }}-win-x64
          path: ${{ steps.pkg.outputs.ZIP_NAME }}
          retention-days: 30
          if-no-files-found: error

      # ── 10. Create GitHub Release (tags only) ────────────────────────────────
      - name: Create GitHub Release
        if: steps.ver.outputs.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: FileMonitor v${{ steps.ver.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: ${{ steps.pkg.outputs.ZIP_NAME }}

